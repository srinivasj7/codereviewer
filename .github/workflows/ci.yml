name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: vet + build + test
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: codereviewer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d codereviewer"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - name: unit tests with race detector
        env:
          CGO_ENABLED: '1'
        run: go test -race ./...
      - name: storepostgres contract tests
        env:
          TESTS_POSTGRES_URL: postgres://postgres:dev@localhost:5432/codereviewer?sslmode=disable
        run: go test -count=1 ./internal/adapters/storepostgres/...

  lint:
    name: golangci-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          # Build golangci-lint from source using the setup-go toolchain
          # above (Go 1.25). The prebuilt binary on the stable channel is
          # Go-1.24-built and can't typecheck our 1.25 source.
          install-mode: 'goinstall'
