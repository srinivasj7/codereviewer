name: Release images

# Build multi-arch (amd64 + arm64/Graviton) distroless images for every
# binary and push to GHCR. Triggered by version tags (v*) or manually.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build ${{ matrix.cmd }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - cmd: webhook-gateway
            target: final-static
          - cmd: review-worker
            target: final-static
          - cmd: indexer-worker
            target: final-cc
          - cmd: feedback-worker
            target: final-static
          - cmd: admin-ui
            target: final-static
          - cmd: backfill-cli
            target: final-static
          - cmd: migrate
            target: final-static
          - cmd: rules-sync
            target: final-git
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          ref_name="${GITHUB_REF##*/}"
          base="ghcr.io/${repo_lower}-${{ matrix.cmd }}"
          {
            echo "tag_versioned=${base}:${ref_name}"
            echo "tag_latest=${base}:latest"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          target: ${{ matrix.target }}
          build-args: |
            CMD=${{ matrix.cmd }}
          push: true
          tags: |
            ${{ steps.tags.outputs.tag_versioned }}
            ${{ steps.tags.outputs.tag_latest }}
          cache-from: type=gha,scope=${{ matrix.cmd }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cmd }}
