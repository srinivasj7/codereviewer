name: codereviewer

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: codereviewer
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codereviewer"]
      interval: 2s
      timeout: 5s
      retries: 30

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 5s
      retries: 15

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: [.env]
    volumes:
      - ./docker/litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:4000/health/liveliness"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        CMD: migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgres://postgres:dev@postgres:5432/codereviewer?sslmode=disable
    restart: "no"

  webhook-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        CMD: webhook-gateway
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file: [.env]
    volumes:
      - ./docker/dev.toml:/app/config.toml:ro
      - ./docker/github-app-key.pem:/run/secrets/github-app-key.pem:ro
    command: ["--config", "/app/config.toml"]

  review-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        CMD: review-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      litellm:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    env_file: [.env]
    volumes:
      - ./docker/dev.toml:/app/config.toml:ro
      - ./docker/github-app-key.pem:/run/secrets/github-app-key.pem:ro
    command: ["--config", "/app/config.toml"]

  indexer-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        CMD: indexer-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      litellm:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    env_file: [.env]
    volumes:
      - ./docker/dev.toml:/app/config.toml:ro
      - ./docker/github-app-key.pem:/run/secrets/github-app-key.pem:ro
    command: ["--config", "/app/config.toml"]

  feedback-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        CMD: feedback-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    env_file: [.env]
    volumes:
      - ./docker/dev.toml:/app/config.toml:ro
    command: ["--config", "/app/config.toml"]

  # rules-sync runs to completion; bring it up on demand with
  # `docker compose run --rm rules-sync`. Requires git in the image.
  rules-sync:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        CMD: rules-sync
    depends_on:
      migrate:
        condition: service_completed_successfully
      litellm:
        condition: service_healthy
    env_file: [.env]
    volumes:
      - ./docker/dev.toml:/app/config.toml:ro
    profiles: ["tools"]
    command: ["--config", "/app/config.toml"]

  # OpenTelemetry collector. Receives traces + metrics from the workers
  # over OTLP/HTTP on 4318. The dev profile prints them to stdout via
  # the `debug` exporter — production deployments swap in OTLP-to-vendor
  # exporters via the collector config file.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318" # OTLP HTTP
      - "13133:13133" # health check
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:13133/"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
