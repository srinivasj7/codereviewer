# Dev config for the docker-compose stack. Service hostnames match the
# names defined in docker-compose.yml. Secrets are pulled from .env via
# the env-var expansion done by internal/config/load.go.

[vcs]
provider         = "github"
# --- GitHub (when provider = "github") ---
app_id           = "${GITHUB_APP_ID}"
installation_id  = "${GITHUB_INSTALLATION_ID}"
private_key_path = "/run/secrets/github-app-key.pem"
webhook_secret   = "${GITHUB_WEBHOOK_SECRET}"
# --- Bitbucket (when provider = "bitbucket") ---
# bitbucket_client_id     = "${BITBUCKET_CLIENT_ID}"
# bitbucket_client_secret = "${BITBUCKET_CLIENT_SECRET}"
# bitbucket_workspace     = "${BITBUCKET_WORKSPACE}"

[message_bus]
type                = "nats"
review_queue_url    = "nats://nats:4222"
index_queue_url     = "nats://nats:4222"
feedback_queue_url  = "nats://nats:4222"
backfill_queue_url  = "nats://nats:4222"

[store]
type         = "postgres"
postgres_url = "postgres://postgres:dev@postgres:5432/codereviewer?sslmode=disable"

[llm]
provider           = "litellm"
gateway_url        = "http://litellm:4000"
primary_model_url  = "primary"
fallback_model_url = "fallback"
embeddings_url     = "embeddings"
api_key            = "${LITELLM_MASTER_KEY}"
per_pr_token_cap   = 30000
# Bumped for local Ollama (qwen2.5:32b-instruct first-call warmup).
# Hosted providers (OpenAI/Anthropic) work fine with smaller values.
chat_timeout_sec   = 600
embed_timeout_sec  = 120

[secrets]
provider = "env"

[observability]
sink          = "otel"
otlp_endpoint = "otel-collector:4318"
service_name  = "codereviewer"

[cost]
daily_usd_cap_default = 5.00

[rules]
git_url = ""
branch  = "main"

[gateway]
listen_addr = ":8080"

[tenant]
id   = "default-tenant"
name = "default"

[admin]
listen_addr         = ":8090"
password            = "${ADMIN_PASSWORD}"
session_secret      = "${ADMIN_SESSION_SECRET}"
session_minutes     = 60
export_dir          = "/app/exports"
auto_export_enabled = true
auto_export_hours   = 24

# Optional GitHub OAuth (leave client_id empty to disable).
[admin.github_oauth]
client_id     = "${ADMIN_GITHUB_OAUTH_CLIENT_ID}"
client_secret = "${ADMIN_GITHUB_OAUTH_CLIENT_SECRET}"
callback_url  = "${ADMIN_GITHUB_OAUTH_CALLBACK_URL}"
allowed_orgs  = []

# Issue-tracker context providers. Each block is independent; leave it
# blank to disable that source. Repository conventions and ad-hoc PR
# context are always on (they have no external auth requirement).
[context]
allowed_url_hosts    = []     # admin UI URL-fetch allow-list (empty = disabled)
url_fetch_max_bytes  = 1048576
max_items_per_pr     = 10

[context.jira]
base_url  = "${JIRA_BASE_URL}"
email     = "${JIRA_EMAIL}"
api_token = "${JIRA_API_TOKEN}"

[context.github_issues]
enabled = true

[context.linear]
api_key      = "${LINEAR_API_KEY}"
team_prefixes = []

# Retention windows enforced by the janitor goroutine in admin-ui.
# Zero/negative on a *_days field means "never delete" for that table.
[retention]
janitor_enabled           = true
janitor_interval_hours    = 6
pr_runs_days              = 365
feedback_events_days      = 730
pr_context_items_days     = 90
embedding_cache_max_rows  = 100000
auto_export_max_files     = 30

# Per-IP rate limits + body cap on the webhook gateway and admin login.
[rate_limit]
login_attempts          = 5
login_window_minutes    = 15
webhook_per_second      = 100
webhook_max_body_bytes  = 1048576
